<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO3 Analytic Tool</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="grid_center">
        <div class='flex_col_center' id="main_div">
            <form class='flex_col_center' id='link_form' action="/submit">
                <label id='link_label' for="work_link">AO3 Work Page Link:</label>
                <input id='link_input' type="text" name="work_link">
            </form>
            <button id="track_btn">Track</button>
            <button id="parse_btn">Compute</button>
        </div>
    </div>
    <div id="stat_content">
        <h2 id="work_title">Title</h2>
        <div id="basic_stat">
            <div id="stat_flex">
                <div class="basic_stat_div">Kudos: <span id="kudo_count">0</span></div>
                <div class="basic_stat_div">Hits: <span id="hit_count">0</span></div>
                <div class="basic_stat_div">Engagement: <span id="engagement_count">0</span></div>
            </div>
        </div>
        <canvas id="kudo_per_day_graph"></canvas>
        <script type="module" src="/src/main.js"></script>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
