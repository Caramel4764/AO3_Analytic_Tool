<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO3 Analytic Tool</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="grid_center">
        <div class='flex_col_center' id="main_div">
            <form class='flex_col_center' id='link_form' action="/submit">
                <label id='link_label' for="work_link">AO3 Work Page Link:</label>
                <input id='link_input' type="text" name="work_link">
            </form>
            <button id="track_btn">Track</button>
            <button id="parse_btn">Compute</button>
        </div>
    </div>
    <div id="stat_content">
        <h2 id="work_title">Title</h2>
        <div id="basic_stat">
            <div class="stat_flex">
                <div class="inner_stat_flex" id="basic_stat_og_div">
                    <div id='kudo_div' class="basic_stat_div">Kudos<span class="info_icon" data_tooltip="Amount of likes. A user can only give 1 kudo per work">ⓘ</span>: <span id="kudo_count">0</span></div>
                    <div id='hit_div' class="basic_stat_div">Hits: <span id="hit_count">0</span></div>
                    <div class="basic_stat_div">Comments: <span id="comment_count">0</span></div>
                    <div class="basic_stat_div">Bookmarks: <span id="bookmark_count">0</span></div>
                </div>
                <div class="inner_stat_flex" id="basic_stat_high_div">
                    <div class="basic_stat_div">Daily Kudo High: <span id="kudo_count_high">0</span></div>
                    <div class="basic_stat_div">Daily Hit High: <span id="kudo_count_high">0</span></div>
                    <div class="basic_stat_div">Daily Comment High: <span id="comment_count_high">0</span></div>
                    <div class="basic_stat_div">Daily Bookmark High: <span id="bookmark_count_high">0</span></div>
                </div>
                <div class="inner_stat_flex" id="other_high_div">
                    <div class="basic_stat_div">Engagement: <span id="engagement_count">0</span></div>
                </div>
            </div>
        </div>
        <div id="graph_gallery">
            <div class='graph_div' id="kudo_per_day_graph_div">
                <h3>Kudos Per Day</h3>
                <canvas id="kudo_per_day_graph"></canvas>
                <script type="module" src="/src/main.ts"></script>
            </div>
            <div class='graph_div' id="hit_per_day_graph_div">
                <h3>Hits Per Day</h3>
                <canvas id="hit_per_day_graph"></canvas>
                <script type="module" src="/src/main.ts"></script>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
